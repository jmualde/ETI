<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
</head>

<style>
    body {
        background-color: #0e1113;
        color: white;
        position: fixed;
        width: 100%;
        height: 100%;
        font-family: 'Inter', sans-serif;
    }


    .tarjeta {
        border: 1px;
        padding: 50px;
        margin: 100px;
        width: 650px;
        background-color: #161a1d;
        border-radius: 10px;
        box-shadow: 1px 1px 10px rgb(83, 83, 83);
        border-color: darkslategray;
        height: 350px;
        margin-left: auto ;
        margin-top: 230px;


    }

    .botonRegistra {
        width: 550px;
        height: 45px;
        border-radius: 50px;
        background-color: white;
        font-weight: bold;
        border: none;
    }

    .botonYaTengoCuenta {
        width: 550px;
        height: 45px;
        border-radius: 50px;
        background: transparent;
        color: white;
        font-weight: bold;
        border: 2px solid white;
    }

    .gris {
        color: #C7D1DB;
        font-weight: bold;
        transition: 0.5s;
    }

    .azul {
        color: #C7D1DB;
        font-weight: bold;
    }


    .campo {
        display: flex;
        background: #0e1113;
        border: 5px solid gray;
        border-radius: 10px;
        width: 550px;
        height: 45px;
        border-width: 1px;
        color: white;
    }
    .registrar {
      margin-left: 0px;
    }
</style>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6">
                
                <div class="tarjeta">
                    <form action="mailProcesa.php" method="POST">
                        <div class="registrar">
                        <h5><center>
                            Ingrese su correo electrónico para recuperar su contraseña
                            </center>
                        </h5>
                        <br>
                        <label class="form-label">E-mail</label>
                        <br>
                        <input type="email" class="campo form-control " id="mailRecuperacion" name="mailRecuperacion" placeholder="E-mail">
                        <br>
                        <button type="submit" class="botonRegistra">Enviar</button>
                    </form>
                </div>
                
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
