<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>PaginaPrincipal</title>
</head>
<style>
body{
    background-color: #101214;
    color: white; 
}

.tarjeta{
    margin-top: 100px;
    border: 1px solid darkslategray;
    padding: 50px;
    background-color: #161a1d;
    border-radius: 10px;
    box-shadow: 1px 1px 10px rgb(83, 83, 83);
}

.botonRegistraAuto{
    width: 225px;
    height: 55px;
    border-radius: 500px;
    background-color: transparent;
    border: 1px solid white;
    font-weight: bold;
}

.textoBlanco{
    color: white;
    margin: 0; 
    transition: 0.5s;
}

.botonCuenta{
    width: 100px;
    height: 55px;
    border-radius: 500px;
    background-color: white;
    font-weight: bold;
    border: none;
    margin-top: 10px;
    margin-left: 1750px;
}

.botonOcupa{
    width: 225px;
    height: 55px;
    border-radius: 500px;
    background-color: white;
    font-weight: bold;
    border: none;
    margin-top: 20px;
}

.mapa{    
    border-radius: 10px;
    max-width: 100%;
}

.textoPrincipal{
    font-size: 70px; 
    margin-top: 100px;
    font-weight: bold;
    color: #f0e8d8;
}

</style>


<body>
<button class="botonCuenta" name="cuenta" id="cuenta">Cuenta</button>

<div class="container">
    <div class="row">
        <div class="col-md-6">
            <br><br>
            <h1 class="textoPrincipal">Estaciona en el caos
y cobrá como capo.
            </h1>
            <br>
            <button class="botonRegistraAuto" name="auto" id="auto">
                <p class="textoBlanco">Registre su vehiculo</p>
            </button>
            <button class="botonOcupa" name="ocupa" id="ocupa">Ocupar lugar</button>
        </div>
        <div class="col-md-6">
            <div class="tarjeta">
                <center>
                    <img class="mapa" src="image.png">
                </center>
            </div>
        </div>
    </div>
</div>

</body>
</html>
